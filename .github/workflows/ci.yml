name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check profiler_main.py app.py test_profiler.py --exit-zero

      - name: Test with pytest
        run: |
          pip install pytest
          python -X utf8 -m pytest test_profiler.py -v --tb=short

      - name: Test API endpoints
        run: |
          python -X utf8 -m pytest test_app.py -v --tb=short

      - name: CLI smoke test
        run: |
          python -X utf8 -c "from profiler_main import main; main()"

  benchmark-validation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up JDK (for Java benchmark)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # g++ ships preinstalled on ubuntu-latest runners.
      - name: Run real-measurement benchmark validation suite
        run: |
          python benchmarks/benchmark_validation.py
        # Fails the build if any of the 18 canonical benchmarks' measured
        # complexity class stops matching its intended label -- a real,
        # reproducible check, not a lint rule. Runs in ~40s.
